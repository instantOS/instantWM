name: Version bump PR

on:
  push:
    branches:
      - main
    paths-ignore:
      - Cargo.toml
      - Cargo.lock
      - CHANGELOG.md
      - packaging/arch/PKGBUILD
      - packaging/arch-bin/PKGBUILD
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to prepare
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

jobs:
  version-bump:
    name: Prepare release PR
    runs-on: self-hosted
    container:
      image: ubuntu:24.04
    if: ${{ github.repository_owner == 'instantOS' }}
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: version-bump-pr
      cancel-in-progress: false
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git python3
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Prepare release changes
        env:
          BUMP: ${{ inputs.bump || 'auto' }}
        run: python3 .github/scripts/prepare-release.py --bump "$BUMP"
      - name: Read prepared version
        id: version
        run: |
          version="$(python3 - <<'PY'
          import re
          from pathlib import Path

          text = Path("Cargo.toml").read_text()
          print(re.search(r'^version = "([^"]+)"', text, re.MULTILINE).group(1))
          PY
          )"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Open or update release PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/version-bump
          delete-branch: true
          commit-message: "chore: release v${{ steps.version.outputs.version }}"
          title: "chore: release v${{ steps.version.outputs.version }}"
          body: |
            Prepare `v${{ steps.version.outputs.version }}`.

            This PR is generated by `.github/scripts/prepare-release.py` and updates:
            - `Cargo.toml`
            - `Cargo.lock`
            - `CHANGELOG.md`
            - `packaging/arch/PKGBUILD`
            - `packaging/arch-bin/PKGBUILD`
