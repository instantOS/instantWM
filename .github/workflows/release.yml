name: Release
on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - CHANGELOG.md
    tags:
      - "v*"
  workflow_dispatch:
jobs:
  metadata:
    name: Prepare release metadata
    runs-on: self-hosted
    container:
      image: ubuntu:24.04
    if: ${{ github.repository_owner == 'instantOS' }}
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.metadata.outputs.should_release }}
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates git
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Configure git
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Determine release tag
        id: metadata
        run: bash scripts/ci/determine-release.sh
  build:
    name: Build release artifacts
    runs-on: self-hosted
    timeout-minutes: 1440
    container:
      image: archlinux:latest
    needs: metadata
    if: ${{ needs.metadata.outputs.should_release == 'true' }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install build dependencies
        run: bash scripts/ci/install-deps-arch.sh
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Create build user
        run: |
          useradd -m builder
          chown -R builder:builder "$PWD"
      - name: Determine target triple
        id: target
        run: |
          target=$(rustc -vV | awk '/^host:/ {print $2}')
          if [[ -z "$target" ]]; then
            echo "Failed to determine host target triple" >&2
            exit 1
          fi
          echo "triple=$target" >> "$GITHUB_OUTPUT"
      - name: Extract version
        id: vars
        run: bash scripts/ci/extract-version.sh "$GITHUB_REF_NAME"
      - name: Run tests
        run: |
          WORKSPACE="$PWD"
          su builder -c "cd '$WORKSPACE' && CARGO_TERM_COLOR=always cargo test --locked"
      - name: Build release binary
        run: |
          WORKSPACE="$PWD"
          su builder -c "cd '$WORKSPACE' && CARGO_TERM_COLOR=always cargo build --release --locked"
      - name: Strip binary
        run: |
          WORKSPACE="$PWD"
          su builder -c "cd '$WORKSPACE' && strip target/release/instantwm target/release/instantwmctl"
      - name: Collect artifacts
        run: bash scripts/ci/package-binary.sh "${{ steps.target.outputs.triple }}" "${{ steps.vars.outputs.version }}" target/release
      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: instantwm-${{ steps.vars.outputs.version }}-${{ steps.target.outputs.triple }}
          path: |
            artifacts/instantwm-${{ steps.target.outputs.triple }}-v${{ steps.vars.outputs.version }}.tgz
            artifacts/instantwm-${{ steps.target.outputs.triple }}-v${{ steps.vars.outputs.version }}.tgz.sha256
  cross-compile:
    # Cross-compile for ARM (aarch64 + armv7). The musl target used to be built
    # here too, but smithay/wayland/X11 pull in a large number of native -sys
    # crates (libudev, libdrm, libgbm, libegl, libgl, libinput, libseat,
    # libwayland, libxkbcommon, libfontconfig, libfreetype, libx11, ...), and
    # Ubuntu doesn't ship :musl variants of those packages. Bringing musl back
    # will require either a dedicated cross-rs image that builds those libs
    # against musl, or a sysroot-based approach (e.g. via Alpine in a chroot).
    # See the multi-arch (arm64/armhf) setup below for the equivalent dance on
    # the glibc side as a starting point.
    name: Cross-compile for ARM targets
    runs-on: self-hosted
    timeout-minutes: 1440
    container:
      image: ubuntu:24.04
    needs: metadata
    if: ${{ needs.metadata.outputs.should_release == 'true' }}
    env:
      CARGO_TERM_COLOR: always
      DEBIAN_FRONTEND: noninteractive
      CARGO_HOME: /opt/cargo
      RUSTUP_HOME: /opt/rustup
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install build dependencies
        # `--cross` enables multi-arch (arm64/armhf), points apt at
        # ports.ubuntu.com for those architectures, and installs the cross
        # toolchains + cross pkg-config wrappers + :arm64/:armhf dev libs.
        run: bash scripts/ci/install-deps-ubuntu.sh --cross
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
      - name: Add Rust cross-compilation targets
        # x86_64-unknown-linux-musl is intentionally omitted until we have a
        # toolchain that can provide musl builds of our native deps (see the
        # comment on this job).
        run: |
          rustup target add \
            aarch64-unknown-linux-gnu \
            armv7-unknown-linux-gnueabihf
      - name: Extract version
        id: vars
        run: bash scripts/ci/extract-version.sh "$GITHUB_REF_NAME"
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: cross-compile
      - name: Cross compile for ARM64 Linux
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          # The pkg-config crate picks up `<triple>-pkg-config` automatically,
          # but be explicit so a future env-stripping change can't break this.
          PKG_CONFIG_aarch64_unknown_linux_gnu: aarch64-linux-gnu-pkg-config
        run: cargo build --locked --release --target aarch64-unknown-linux-gnu
      - name: Cross compile for ARMv7 Linux
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          PKG_CONFIG_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-pkg-config
        run: cargo build --locked --release --target armv7-unknown-linux-gnueabihf
      - name: Strip cross-compiled binaries
        run: |
          aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/instantwm target/aarch64-unknown-linux-gnu/release/instantwmctl
          arm-linux-gnueabihf-strip target/armv7-unknown-linux-gnueabihf/release/instantwm target/armv7-unknown-linux-gnueabihf/release/instantwmctl
      - name: Collect cross-compile artifacts
        run: |
          bash scripts/ci/package-binary.sh aarch64-unknown-linux-gnu       "${{ steps.vars.outputs.version }}" target/aarch64-unknown-linux-gnu/release
          bash scripts/ci/package-binary.sh armv7-unknown-linux-gnueabihf   "${{ steps.vars.outputs.version }}" target/armv7-unknown-linux-gnueabihf/release
      - name: Upload cross-compile artifacts
        uses: actions/upload-artifact@v4
        with:
          name: instantwm-${{ steps.vars.outputs.version }}-cross-binaries
          path: |
            artifacts/instantwm-aarch64-unknown-linux-gnu-v${{ steps.vars.outputs.version }}.tgz
            artifacts/instantwm-aarch64-unknown-linux-gnu-v${{ steps.vars.outputs.version }}.tgz.sha256
            artifacts/instantwm-armv7-unknown-linux-gnueabihf-v${{ steps.vars.outputs.version }}.tgz
            artifacts/instantwm-armv7-unknown-linux-gnueabihf-v${{ steps.vars.outputs.version }}.tgz.sha256
      - name: Clean up toolchains
        if: always()
        run: rm -rf /opt/cargo /opt/rustup
  pkgbuild:
    name: Build Arch package
    runs-on: self-hosted
    timeout-minutes: 1440
    container:
      image: archlinux:latest
    needs:
      - metadata
      - build
    if: ${{ needs.metadata.outputs.should_release == 'true' }}
    steps:
      - name: Initialise pacman and install git
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install build dependencies
        run: bash scripts/ci/install-deps-arch.sh
      - name: Extract version
        id: vars
        run: bash scripts/ci/extract-version.sh "$GITHUB_REF_NAME"
      - name: Create build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builder:builder "$PWD"
      - name: Create source tarball
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          git config --global --add safe.directory "$PWD"
          git archive --format=tar.gz --prefix="instantwm-${VERSION}/" -o "instantwm-${VERSION}.tar.gz" HEAD
      - name: Copy PKGBUILD to build context
        run: cp packaging/arch/PKGBUILD .
      - name: Build package
        run: |
          WORKSPACE="$PWD"
          su builder -c "cd '$WORKSPACE' && makepkg -s --noconfirm --skippgpcheck"
      - name: Collect package artifacts
        run: |
          mkdir -p artifacts
          shopt -s nullglob
          for pkg in *.pkg.tar.zst; do mv "$pkg" artifacts/; done
          for src in *.src.tar.zst; do mv "$src" artifacts/; done
      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: instantwm-${{ steps.vars.outputs.version }}-arch-packages
          path: artifacts/
  deb:
    name: Build Debian package
    runs-on: self-hosted
    container:
      image: ubuntu:24.04
    needs:
      - metadata
      - build
    if: ${{ needs.metadata.outputs.should_release == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install build dependencies
        run: |
          bash scripts/ci/install-deps-ubuntu.sh
          apt-get install -y --no-install-recommends dpkg-dev
      - name: Extract version
        id: vars
        run: bash scripts/ci/extract-version.sh "$GITHUB_REF_NAME"
      - name: Download native build artifact
        uses: actions/download-artifact@v4
        with:
          name: instantwm-${{ steps.vars.outputs.version }}-x86_64-unknown-linux-gnu
          path: dist
      - name: Extract binary from tarball
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          tar -xzf "dist/instantwm-x86_64-unknown-linux-gnu-v${VERSION}.tgz" -C dist
          install -Dm0755 "dist/instantwm-x86_64-unknown-linux-gnu-v${VERSION}/instantwm" target/release/instantwm
          install -Dm0755 "dist/instantwm-x86_64-unknown-linux-gnu-v${VERSION}/instantwmctl" target/release/instantwmctl
      - name: Build .deb package
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          chmod +x utils/build_deb.sh
          ./utils/build_deb.sh
      - name: Collect deb artifacts
        env:
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          mkdir -p artifacts
          mv "target/deb/instantwm_${VERSION}_amd64.deb" artifacts/
          cd artifacts && sha256sum "instantwm_${VERSION}_amd64.deb" > "instantwm_${VERSION}_amd64.deb.sha256"
      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: instantwm-${{ steps.vars.outputs.version }}-deb
          path: artifacts/
  release:
    name: Publish GitHub release
    runs-on: self-hosted
    container:
      image: ubuntu:24.04
    needs:
      - metadata
      - build
      - cross-compile
      - pkgbuild
      - deb
    permissions:
      contents: write
    if: ${{ needs.metadata.outputs.should_release == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Extract release notes
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
        run: bash scripts/ci/extract-release-notes.sh "$VERSION" > release-notes.md
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag }}
          name: ${{ needs.metadata.outputs.tag }}
          body_path: release-notes.md
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
